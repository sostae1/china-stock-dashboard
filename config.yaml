# OpenClaw-data-china-stock：仅保留本仓库 tools_manifest 已注册工具及其依赖代码会读取的配置项。
# 已移除：option_contracts、signal_params、etf_trading、opening_analysis、volatility_engine、
# prediction_quality、prediction_monitoring、llm_enhancer、data_sources、tushare.prefer_minute、
# notification 中非 webhook 的大型块、system.data_storage 下未参与缓存路径的子项等（无工具引用）。
# ${VAR} 由 src/config_loader.py 在加载时解析为环境变量。

logging:
  level: INFO
  file_path: logs/openclaw-data-china-stock_{date}.log
  max_file_size_mb: 10
  backup_count: 7

# src/realtime_full_fetch_cache.py：指数/ETF 全量快照类请求的进程内短缓存
realtime_full_fetch_cache:
  enabled: true
  ttl_seconds: 45

system:
  data_storage:
    data_dir: data
  trading_hours:
    morning_start: 09:30
    morning_end: '11:30'
    afternoon_start: '13:00'
    afternoon_end: '15:00'
    timezone: Asia/Shanghai
    holidays:
      2026:
      - '20260101'
      - '20260102'
      - '20260103'
      - '20260215'
      - '20260216'
      - '20260217'
      - '20260218'
      - '20260219'
      - '20260220'
      - '20260221'
      - '20260222'
      - '20260223'
      - '20260404'
      - '20260405'
      - '20260406'
      - '20260501'
      - '20260502'
      - '20260503'
      - '20260504'
      - '20260505'
      - '20260619'
      - '20260620'
      - '20260621'
      - '20260925'
      - '20260926'
      - '20260927'
      - '20261001'
      - '20261002'
      - '20261003'
      - '20261004'
      - '20261005'
      - '20261006'
      - '20261007'

# src/data_cache.py：enabled=false 时不写入 parquet（仍可读已有缓存）
data_cache:
  enabled: true

tushare:
  enabled: true
  token: "${TUSHARE_TOKEN}"
  # src/tushare_fallback.py stk_mins 限频；默认 true，显式写出便于查阅
  enable_rate_limit: true
