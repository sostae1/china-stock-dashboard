- id: tool_read_index_minute
  label: 读取指数分钟数据
  description: 从本地缓存读取指数分钟数据。
  description_short: 从本地缓存读取指数分钟数据。
  parameters:
    type: object
    properties:
      symbol:
        type: string
        description: 指数代码
      period:
        type: string
        description: 周期
      date:
        type: string
        description: 日期
    required:
