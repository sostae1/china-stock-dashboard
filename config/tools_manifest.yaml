- id: tool_fetch_market_data
  label: 获取市场数据（跨资产统一入口）
  description: Cross-asset unified entry. asset_type= index|etf|option|stock; view=realtime|historical|minute|opening|greeks|global_spot|iopv_snapshot.
    Returns the underlying merged tool result.
  description_short: 跨资产统一入口（推荐）
  parameters:
    type: object
    properties:
      asset_type:
        type: string
        description: index|etf|option|stock
        default: index
      asset_code:
        type: string
        description: index_code / etf_code / stock_code（可选）
        default: ''
      contract_code:
        type: string
        description: option contract_code（可选）
        default: ''
      view:
        type: string
        description: realtime|historical|minute|opening|greeks|global_spot|iopv_snapshot
        default: realtime
      period:
        type: string
        description: minute周期（如 1|5|15|30|60，可选）
      start_date:
        type: string
        description: 历史/分钟起始日期（YYYYMMDD，可选）
      end_date:
        type: string
        description: 历史/分钟结束日期（YYYYMMDD，可选）
      lookback_days:
        type: number
        description: 回溯天数
        default: 5
      mode:
        type: string
        description: production|debug
        default: production
    required:
    - asset_type
    - view
