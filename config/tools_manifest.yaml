    - period
    - date
- id: tool_read_etf_daily
  label: 读取ETF日线数据
  description: 从本地缓存读取ETF日线数据。
  description_short: 从本地缓存读取ETF日线数据。
  parameters:
    type: object
    properties:
      symbol:
        type: string
        description: ETF代码
      start_date:
        type: string
        description: 开始日期
      end_date:
        type: string
        description: 结束日期
    required:
    - symbol
- id: tool_read_etf_minute
  label: 读取ETF分钟数据
  description: 从本地缓存读取ETF分钟数据。
  description_short: 从本地缓存读取ETF分钟数据。
  parameters:
    type: object
    properties:
      symbol:
        type: string
        description: ETF代码
      period:
        type: string
        description: 周期
      date:
        type: string
        description: 日期
    required:
    - symbol
    - period
    - date
- id: tool_read_option_minute
  label: 读取期权分钟数据
  description: 从本地缓存读取期权分钟数据。
  description_short: 从本地缓存读取期权分钟数据。
  parameters:
    type: object
    properties:
      contract_code:
        type: string
        description: 期权合约代码
      period:
        type: string
        description: 周期
      date:
        type: string
        description: 日期
    required:
    - contract_code
    - period
    - date
- id: tool_read_option_greeks
  label: 读取期权Greeks数据
  description: 从本地缓存读取期权Greeks数据。
  description_short: 从本地缓存读取期权Greeks数据。
  parameters:
    type: object
    properties:
      contract_code:
        type: string
        description: 期权合约代码
      date:
        type: string
        description: 日期
    required:
    - contract_code
    - date
- id: tool_fetch_stock_financials
  label: 获取A股财务指标
  description: 批量获取A股个股最新财务指标（PE_TTM、PB、ROE、股息率等），供量化选股或单独查询。
  description_short: 批量获取A股个股最新财务指标（PE_TTM、PB、ROE、股息率等）…
  parameters:
    type: object
    properties:
      symbols:
        type: string
        description: 股票代码，逗号分隔或数组，如 600000,000001
      lookback_report_count:
        type: number
        description: 保留最近几个报告期
        default: 1
    required:
    - symbols
- id: tool_fetch_stock_historical
  label: 获取个股历史K线
  description: 获取A股个股历史K线数据（日线/周线/月线）。
  description_short: 获取A股个股历史K线数据（日线/周线/月线）。
  parameters:
    type: object
    properties:
      stock_code:
        type: string
        description: 股票代码
        default: '600000'
      period:
        type: string
        description: daily|weekly|monthly
        default: daily
      start_date:
        type: string
        description: 开始日期
      end_date:
        type: string
        description: 结束日期
- id: tool_fetch_stock_minute
  label: 获取个股分钟数据
  description: 获取A股个股分钟K线数据。
  description_short: 获取A股个股分钟K线数据。
  parameters:
    type: object
    properties:
      stock_code:
        type: string
        description: 股票代码
        default: '600000'
      period:
        type: string
        description: 5|15|30|60
        default: '5'
      start_date:
        type: string
      end_date:
        type: string
      lookback_days:
        type: number
        description: 回溯天数
        default: 5
- id: tool_fetch_stock_realtime
  label: 获取个股实时数据
  description: 获取A股个股实时行情。
  description_short: 获取A股个股实时行情。
  parameters:
    type: object
    properties:
      stock_code:
        type: string
        description: 股票代码
        default: '600000'
      mode:
        type: string
        description: production|test
        default: production
- id: tool_stock_data_fetcher
  label: 个股数据采集与技术指标汇总
  description: 批量拉取个股 realtime/daily/minute/financials，并可选计算 MACD/RSI/BOLL/MA 等技术指标与简单分析。
  description_short: 个股数据采集与技术指标汇总
  parameters:
    type: object
    properties:
      action:
        type: string
        enum:
        - fetch
        default: fetch
      symbols:
        type: string
        description: 股票代码，逗号分隔或数组，如 000539,300895
      data_types:
        type: array
        description: 需要获取的数据类型
        items:
          type: string
          enum:
          - realtime
          - daily
          - minute
          - financials
          - technicals
        default:
        - realtime
        - daily
        - minute
        - financials
        - technicals
      minute_period:
        type: string
        description: 分钟周期，如 5,15,30
        default: 5,15,30
      lookback_days:
        type: number
        description: 回溯天数
        default: 20
      indicators:
        type: array
        description: 技术指标列表
        items:
          type: string
        default:
        - ma
        - macd
        - rsi
        - bollinger
      include_analysis:
        type: boolean
        default: false
      mode:
        type: string
        description: production|test
        default: production
    required:
    - action
    - symbols
- id: tool_stock_monitor
  label: 个股监控与触发预警
  description: 对 watchlist 执行触发器检查（price_change/volume_surge/support_break），触发后可选发送飞书通知。
  description_short: 个股监控与触发预警
  parameters:
    type: object
    properties:
      action:
        type: string
        enum:
        - start
        - stop
        - status
        - run_once
        default: run_once
      watchlist:
        type: array
        description: 股票代码列表
        items:
          type: string
      triggers:
        type: array
        description: 触发规则
        items:
          type: object
          properties:
            type:
              type: string
              description: price_change|volume_surge|support_break
            symbol:
              type: string
              description: 可选，指定单只股票
            pct:
              type: number
              description: price_change 阈值（百分比）
            ratio:
              type: number
              description: volume_surge 阈值（倍数）
            level:
              type: number
              description: support_break 支撑位阈值
          required:
          - type
      output_channel:
        type: string
        description: feishu|dingtalk(仅返回消息)
        default: feishu
      cooldown_minutes:
        type: number
        description: 同类事件去重窗口（分钟）
        default: 30
      mode:
        type: string
        description: production|test
        default: production
      state_path:
        type: string
        description: 监控状态文件路径，可选
    required:
    - action
- id: tool_fetch_limit_up_stocks
  label: 获取涨停股列表
  description: 获取指定日或区间的涨停股列表（涨停回马枪数据源）。
  description_short: 获取指定日或区间的涨停股列表（涨停回马枪数据源）。
  parameters:
    type: object
    properties:
      date:
        type: string
        description: 单日 YYYYMMDD
      start_date:
        type: string
        description: 区间开始 YYYYMMDD
      end_date:
        type: string
        description: 区间结束 YYYYMMDD
      exclude_st:
        type: boolean
        description: 是否排除ST
        default: true
      exclude_tail_limit_up:
        type: boolean
        description: 是否排除尾盘涨停
        default: true
- id: tool_sector_heat_score
  label: 板块热度评分
  description: 计算板块热度评分（涨停回马枪用）。
  description_short: 计算板块热度评分（涨停回马枪用）。
  parameters:
    type: object
    properties:
      date:
        type: string
        description: 日期 YYYYMMDD
      limit_up_data:
        type: array
        description: 可选，涨停数据
      sector_data:
        type: object
        description: 可选，板块数据
- id: tool_write_limit_up_with_sector
  label: 涨停+板块日报写入
  description: 拉取当日涨停、板块热度与龙头，写入 data/limit_up_research 目录。
  description_short: 拉取当日涨停、板块热度与龙头，写入 data/limit_up_re…
  parameters:
    type: object
    properties:
      date:
        type: string
        description: 日期 YYYYMMDD
      output_path:
        type: string
        description: 可选输出路径
- id: tool_limit_up_daily_flow
  label: 涨停每日流程
  description: 涨停回马枪每日流程：拉取涨停、板块热度、写JSON与报告、可选发飞书。
  description_short: 涨停回马枪每日流程：拉取涨停、板块热度、写JSON与报告、可选发飞书。
  parameters:
    type: object
    properties:
      date:
        type: string
        description: 日期
      write_json:
        type: boolean
        default: true
      write_report:
        type: boolean
        default: true
      send_feishu:
