name: Refresh Stock Data

on:
  schedule:
    # 涓婂崍 9:35锛堝紑鐩樺悗锛夊拰 涓嬪崍 15:10锛堟敹鐩樺悗锛夛紝鍖椾含鏃堕棿 = UTC+8
    - cron: '35 1 * * 1-5'
    - cron: '10 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install akshare==1.18.54 requests>=2.31.0

      - name: Run data refresh
        run: python .github/workflows/refresh_data.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Commit and push if changed
        run: |
          if git diff --quiet snapshot_v5.json; then
            echo "No data changes"
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add snapshot_v5.json
            git commit -m "chore: refresh stock data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          fi

      - name: Trigger Pages deploy
        if: env.HAS_CHANGES == 'true'
        run: |
          # 用 GitHub API 触发 Pages 部署，不用 gh 命令
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages/deployments \
            -d '{"environment": "github-pages"}'
          echo "Pages deployment triggered"
