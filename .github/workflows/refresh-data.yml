name: Refresh Stock Data

on:
  schedule:
    # 上午 9:35（开盘后） 和 下午 15:10（收盘后），北京时间 = UTC+8
    # 9:35 UTC+8 = 01:35 UTC
    # 15:10 UTC+8 = 07:10 UTC
    - cron: '35 1 * * 1-5'
    - cron: '10 7 * * 1-5'
  workflow_dispatch:
    # 也支持手动触发

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install akshare==1.18.54 requests>=2.31.0

      - name: Run data refresh
        run: python .github/workflows/refresh_data.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No data changes, skip commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add snapshot_v5.json
            git commit -m "chore: refresh stock data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
